<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mapBg" x1="60" y1="20" x2="1140" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#10192C"/>
    </linearGradient>
    <linearGradient id="link" x1="260" y1="160" x2="946" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3E8CFF"/>
      <stop offset="0.5" stop-color="#61DAFB"/>
      <stop offset="1" stop-color="#3E8CFF"/>
    </linearGradient>
    <filter id="soft" x="-40" y="-40" width="1280" height="400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020611" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#mapBg)"/>

  <text x="58" y="54" fill="#8FB7FF" font-family="Segoe UI, Arial, sans-serif" font-size="13" letter-spacing="0.2em">ENGINEERING LENS</text>
  <text x="58" y="92" fill="#F7FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Three layers I keep connecting in my work</text>

  <path d="M250 180H950" stroke="url(#link)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
  <circle cx="250" cy="180" r="8" fill="#61DAFB"/>
  <circle cx="600" cy="180" r="8" fill="#61DAFB"/>
  <circle cx="950" cy="180" r="8" fill="#61DAFB"/>

  <g filter="url(#soft)">
    <rect x="92" y="122" width="316" height="132" rx="22" fill="#0E1830" stroke="#2B4E95"/>
    <rect x="442" y="122" width="316" height="132" rx="22" fill="#0E1830" stroke="#2B4E95"/>
    <rect x="792" y="122" width="316" height="132" rx="22" fill="#0E1830" stroke="#2B4E95"/>
  </g>

  <text x="124" y="158" fill="#61DAFB" font-family="Segoe UI, Arial, sans-serif" font-size="14" letter-spacing="0.18em">DISTRIBUTED SYSTEMS</text>
  <text x="124" y="188" fill="#F7FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Reliability under load</text>
  <text x="124" y="219" fill="#B7C9E3" font-family="Segoe UI, Arial, sans-serif" font-size="15">services, queues, data flow, fault tolerance, cloud-native deployment</text>

  <text x="474" y="158" fill="#61DAFB" font-family="Segoe UI, Arial, sans-serif" font-size="14" letter-spacing="0.18em">ML INFRASTRUCTURE</text>
  <text x="474" y="188" fill="#F7FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Training and inference at scale</text>
  <text x="474" y="219" fill="#B7C9E3" font-family="Segoe UI, Arial, sans-serif" font-size="15">GPU optimization, model serving, pipelines, benchmarking, deployment</text>

  <text x="824" y="158" fill="#61DAFB" font-family="Segoe UI, Arial, sans-serif" font-size="14" letter-spacing="0.18em">PERFORMANCE ENGINEERING</text>
  <text x="824" y="188" fill="#F7FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Measured, not assumed</text>
  <text x="824" y="219" fill="#B7C9E3" font-family="Segoe UI, Arial, sans-serif" font-size="15">profilers, traces, latency budgets, throughput, bottleneck hunting</text>
</svg>
